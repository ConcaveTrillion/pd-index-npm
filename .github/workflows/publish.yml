name: Publish package to pdomain-index-npm

on:
  workflow_dispatch:
    inputs:
      tarball_url:
        description: "URL to the .tgz to publish (typically a GitHub Release asset URL)"
        required: true
        type: string
  repository_dispatch:
    types: [pd-npm-publish]

concurrency:
  # Serialize all publishes; the gh-pages branch is mutated.
  group: pdomain-index-npm-publish
  cancel-in-progress: false

permissions:
  contents: write # to push to gh-pages
  pages: write # to deploy
  id-token: write # for the Pages deploy action

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (tooling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: tooling
      - name: Checkout gh-pages (registry content)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          path: registry
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Build tooling
        working-directory: tooling
        run: |
          make setup
          make ci
      - name: Resolve tarball URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "url=${{ github.event.client_payload.tarball_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ inputs.tarball_url }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        working-directory: tooling
        env:
          TARBALL_URL: ${{ steps.url.outputs.url }}
          REGISTRY_ROOT: ${{ github.workspace }}/registry
          BASE_URL: https://pdomain.github.io/pdomain-index-npm/
        run: |
          make publish-pkg \
            TARBALL_URL="$TARBALL_URL" \
            ROOT="$REGISTRY_ROOT" \
            BASE_URL="$BASE_URL"
      - name: Commit + push gh-pages
        working-directory: registry
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit; tarball was already present."
            exit 0
          fi
          git commit -m "publish: ${{ steps.url.outputs.url }}"
          git push origin gh-pages

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Wait for Pages to update
        # Pages publish lag — usually ~30-60s, occasionally >90s. Poll with backoff.
        env:
          PACKUMENT_URL: https://pdomain.github.io/pdomain-index-npm/@pdomain/test-package/
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL "$PACKUMENT_URL" | grep -q '"name":"@pdomain/test-package"'; then
              echo "Pages live after attempt $i"
              exit 0
            fi
            echo "Attempt $i: packument not yet live; sleeping 30s"
            sleep 30
          done
          echo "Pages did not become available after 5 attempts (150s total)" >&2
          exit 1
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run smoke test
        run: make smoke
